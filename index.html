  <style>
    /* Language switcher bar */
    .lang-switcher {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      display: flex;
      gap: 4px;
      padding: 8px 12px;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 0 0 12px 12px;
      max-width: 520px;
      width: 100%;
      flex-wrap: wrap;
      justify-content: center;
    }
    .lang-switcher button {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.6rem;
      font-weight: 600;
      padding: 5px 8px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      background: rgba(255,255,255,0.08);
      color: #ccc;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .lang-switcher button:hover { background: rgba(255,255,255,0.15); }
    .lang-switcher button.active {
      background: rgba(200,176,128,0.2);
      border-color: rgba(200,176,128,0.4);
      color: #DCC898;
    }
    .hero { padding-top: 50px; }
  </style>
</head>
<body>

  <!-- Language Switcher -->
  <div class="lang-switcher" id="langSwitcher">
    <button data-lang="en" class="active">EN</button>

    <button data-lang="zh-CN">简体中文</button>
    <button data-lang="fr">Français</button>
    <button data-lang="es">Español</button>
    <button data-lang="de">Deutsch</button>

  <!-- ===== HERO ===== -->

  <section id="hero" class="hero">

    </div>
  </section>

    <div class="qr-vote" id="qrVote" hidden>

      <div class="qr-vote-buttons">

      <p class="qr-confirm-text" data-i18n="vote_recorded"></p>
    </div>

    <div class="vote-box">
      <p class="results-question" data-i18n="vote_question"></p>
      <div class="result-bars">
        <div class="bar-group">
          <div class="bar-label">
            <span class="bar-name" data-i18n="vote_yes"></span>
            <span class="bar-pct" id="pctTasteYes">0%</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill bar-fill-yes" id="barTasteYes" style="width:0%"></div>
          </div>
        </div>
        <div class="bar-group">
          <div class="bar-label">
            <span class="bar-name" data-i18n="vote_no"></span>
            <span class="bar-pct" id="pctTasteNo">0%</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill bar-fill-no" id="barTasteNo" style="width:0%"></div>
          </div>
        </div>
      </div>
      <span class="vote-box-count" id="totalTasting">0 votes</span>
    </div>

    <p class="event-cta" data-i18n="event_cta"></p>

    <div class="cities-bar current-location-bar" data-i18n-html="current_location"></div>
  </div>

    <div class="modal" role="dialog" aria-labelledby="rulesTitle">

    </div>

        'Anda harus berusia di atas 18 tahun. Alamat harus merupakan alamat pengiriman yang valid.',
        'Satu entri per orang. Akun Anda harus bersifat publik untuk ikut serta.',
        'Peserta dari negara berikut tidak memenuhi syarat: Iran, Lebanon, Suriah, Thailand, India, Turki, Mesir, Qatar, dan Rusia. Pembatasan ini disebabkan oleh keterbatasan politik atau logistik saat ini (dapat berubah).',
        'Giveaway ini tidak disponsori, didukung, dikelola oleh, atau terkait dengan Instagram.',
        'Acaia berhak menyesuaikan aturan ini kapan saja.',
        'Semoga beruntung!'
      ],
      highlights_title: 'Sorotan Acara',
      brand_blurb: '<strong>Horizon \u2014 Bukan sekadar atmosfer, ini pengalaman sensorik.</strong>',
      full_rules: 'Aturan Lengkap',
      privacy: 'Privasi',
      no_purchase: 'Tidak perlu pembelian.',
      votes_suffix: 'suara'
    }
  };

  let currentLang = 'en';

  function applyTranslations(lang) {
    currentLang = lang;
    const t = TRANSLATIONS[lang];
    if (!t) return;

    document.documentElement.lang = lang;

    // Text content
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (t[key] !== undefined) el.textContent = t[key];
    });

    // HTML content (for links inside text)
    document.querySelectorAll('[data-i18n-html]').forEach(el => {
      const key = el.getAttribute('data-i18n-html');
      if (t[key] !== undefined) el.innerHTML = t[key];
    });

    // Rules list
    const rulesList = document.getElementById('rulesList');
    if (rulesList && t.rules) {
      rulesList.innerHTML = t.rules.map(r => '<li>' + r + '</li>').join('');
    }

    // Update vote count suffix
    const totalEl = document.getElementById('totalTasting');
    if (totalEl) {
      const num = totalEl.textContent.replace(/[^\d]/g, '') || '0';
      totalEl.textContent = num + ' ' + t.votes_suffix;
    }

    // Update switcher active state
    document.querySelectorAll('.lang-switcher button').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === lang);
    });
  }

  // Switcher click handler
  document.getElementById('langSwitcher').addEventListener('click', e => {
    const btn = e.target.closest('button[data-lang]');
    if (!btn) return;
    applyTranslations(btn.dataset.lang);
  });

  // Detect browser language and apply
  function detectLang() {
    const supported = Object.keys(TRANSLATIONS);
    const nav = navigator.language || navigator.userLanguage || 'en';
    // Exact match first (e.g. zh-TW, zh-CN)
    if (supported.includes(nav)) return nav;
    // Match base language (e.g. fr-FR → fr, de-AT → de)
    const base = nav.split('-')[0];
    const match = supported.find(s => s.split('-')[0] === base);
    if (match) return match;
    return 'en';
  }
  document.addEventListener('DOMContentLoaded', () => applyTranslations(detectLang()));
  </script>
</body>
