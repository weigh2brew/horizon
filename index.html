  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    /* Language switcher bar */
    .lang-switcher {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      display: flex;
      gap: 4px;
      padding: 8px 12px;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 0 0 12px 12px;
      max-width: 520px;
      width: 100%;
      flex-wrap: wrap;
      justify-content: center;
    }
    .lang-switcher button {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.6rem;
      font-weight: 600;
      padding: 5px 8px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      background: rgba(255,255,255,0.08);
      color: #ccc;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .lang-switcher button:hover { background: rgba(255,255,255,0.15); }
    .lang-switcher button.active {
      background: rgba(200,176,128,0.2);
      border-color: rgba(200,176,128,0.4);
      color: #DCC898;
    }
    .hero { padding-top: 50px; }
  </style>
</head>
<body>

  <!-- Language Switcher -->
  <div class="lang-switcher" id="langSwitcher">
    <button data-lang="en" class="active">EN</button>
    <button data-lang="zh-TW">繁體中文</button>
    <button data-lang="zh-CN">简体中文</button>
    <button data-lang="fr">Français</button>
    <button data-lang="es">Español</button>
    <button data-lang="de">Deutsch</button>
    <button data-lang="ja">日本語</button>
    <button data-lang="ko">한국어</button>
    <button data-lang="id">Bahasa</button>
  </div>

  <!-- ===== HERO ===== -->
  <div class="bg-blackhole"></div>
  <section id="hero" class="hero">
    <div class="hero-content">
      <h1 class="hero-title">Event<br>Horizon</h1>
      <p class="hero-tagline">by Acaia</p>
    </div>
  </section>

  <!-- ===== DESCRIPTION + VOTE + CTA ===== -->
  <div class="content-upper">
    <p class="event-desc" data-i18n="event_desc"></p>

    <!-- QR voting buttons -->
    <div class="qr-vote" id="qrVote" hidden>
      <p class="qr-vote-prompt" data-i18n="vote_question"></p>
      <div class="qr-vote-buttons">
        <button class="btn btn-vote btn-vote-yes" id="btnVoteYes" data-i18n="vote_yes"></button>
        <button class="btn btn-vote btn-vote-no" id="btnVoteNo" data-i18n="vote_no_btn"></button>
      </div>
    </div>

    <!-- QR vote confirmation -->
    <div class="qr-confirm" id="qrConfirm" hidden>
      <div class="qr-confirm-icon">&#10003;</div>
      <p class="qr-confirm-text" data-i18n="vote_recorded"></p>
    </div>

    <div class="vote-box">
      <p class="results-question" data-i18n="vote_question"></p>
      <div class="result-bars">
        <div class="bar-group">
          <div class="bar-label">
            <span class="bar-name" data-i18n="vote_yes"></span>
            <span class="bar-pct" id="pctTasteYes">0%</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill bar-fill-yes" id="barTasteYes" style="width:0%"></div>
          </div>
        </div>
        <div class="bar-group">
          <div class="bar-label">
            <span class="bar-name" data-i18n="vote_no"></span>
            <span class="bar-pct" id="pctTasteNo">0%</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill bar-fill-no" id="barTasteNo" style="width:0%"></div>
          </div>
        </div>
      </div>
      <span class="vote-box-count" id="totalTasting">0 votes</span>
    </div>

    <p class="event-cta" data-i18n="event_cta"></p>

    <div class="cities-bar">
      Dublin &middot; Tokyo &middot; Seoul &middot; Melbourne &middot; San Diego &middot; Amsterdam &middot; Osaka
    </div>
  </div>

  <!-- ===== SHARE TO WIN ===== -->
  <section id="giveaway" class="section giveaway">
    <h2 class="section-title" data-i18n-html="giveaway_title"></h2>
    <div class="rules-title-inline" data-i18n="to_enter"></div>
    <ol class="entry-rules">
      <li data-i18n-html="step1"></li>
      <li data-i18n-html="step2"></li>
      <li data-i18n="step3"></li>
    </ol>
    <p class="giveaway-subtitle" data-i18n="giveaway_subtitle"></p>

    <!-- Entry Bonuses -->
    <div class="bonus-entries-card">
      <p class="bonus-entries-title" data-i18n="entries_bonuses"></p>
      <table class="bonus-table">
        <tr>
          <td class="bonus-action" data-i18n="bonus_comment_tag"></td>
          <td class="bonus-value" data-i18n="bonus_1_entry"></td>
        </tr>
        <tr>
          <td class="bonus-action" data-i18n="bonus_additional_tags"></td>
          <td class="bonus-value bonus-value-accent" data-i18n="bonus_plus1"></td>
        </tr>
        <tr>
          <td class="bonus-action" data-i18n-html="bonus_repost"></td>
          <td class="bonus-value bonus-value-glow" data-i18n="bonus_plus5"></td>
        </tr>
      </table>
      <p class="bonus-stack-note" data-i18n-html="bonus_stack"></p>
    </div>

    <!-- Countdown -->
    <div class="countdown-block">
      <p class="countdown-label" data-i18n="winner_announcement"></p>
      <div class="countdown" id="countdown">
        <div class="cd-unit"><span id="cdDays">00</span><small data-i18n="days"></small></div>
        <div class="cd-unit"><span id="cdHours">00</span><small data-i18n="hrs"></small></div>
        <div class="cd-unit"><span id="cdMins">00</span><small data-i18n="min"></small></div>
        <div class="cd-unit"><span id="cdSecs">00</span><small data-i18n="sec"></small></div>

    </div>

    </div>

  <!-- ===== EVENT HIGHLIGHTS ===== -->

    <div class="photo-scroll" id="photoScroll"></div>
    <p class="brand-blurb" data-i18n-html="brand_blurb"></p>

  let currentLang = 'en';

  function applyTranslations(lang) {
    currentLang = lang;
    const t = TRANSLATIONS[lang];
    if (!t) return;

    document.documentElement.lang = lang;

    // Text content
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (t[key] !== undefined) el.textContent = t[key];
    });

    // HTML content (for links inside text)
    document.querySelectorAll('[data-i18n-html]').forEach(el => {
      const key = el.getAttribute('data-i18n-html');
      if (t[key] !== undefined) el.innerHTML = t[key];
    });

    // Rules list
    const rulesList = document.getElementById('rulesList');
    if (rulesList && t.rules) {
      rulesList.innerHTML = t.rules.map(r => '<li>' + r + '</li>').join('');
    }

    // Update vote count suffix
    const totalEl = document.getElementById('totalTasting');
    if (totalEl) {
      const num = totalEl.textContent.replace(/[^\d]/g, '') || '0';
      totalEl.textContent = num + ' ' + t.votes_suffix;
    }

    // Update switcher active state
    document.querySelectorAll('.lang-switcher button').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === lang);
    });
  }

  // Switcher click handler
  document.getElementById('langSwitcher').addEventListener('click', e => {
    const btn = e.target.closest('button[data-lang]');
    if (!btn) return;
    applyTranslations(btn.dataset.lang);
  });

  // Detect browser language and apply
  function detectLang() {
    const supported = Object.keys(TRANSLATIONS);
    const nav = navigator.language || navigator.userLanguage || 'en';
    // Exact match first (e.g. zh-TW, zh-CN)
    if (supported.includes(nav)) return nav;
    // Match base language (e.g. fr-FR → fr, de-AT → de)
    const base = nav.split('-')[0];
    const match = supported.find(s => s.split('-')[0] === base);
    if (match) return match;
    return 'en';
  }
  document.addEventListener('DOMContentLoaded', () => applyTranslations(detectLang()));
  </script>
